<svg
  xmlns="http://www.w3.org/2000/svg"
  width="400"
  height="400"
  viewBox="0 0 400 400"
  role="img"
  aria-labelledby="p-spk-title p-spk-desc"
>
  <title id="p-spk-title">Portable speaker</title>
  <desc id="p-spk-desc">A square illustration of a cylindrical portable Bluetooth speaker</desc>

  <defs>
    <linearGradient id="p-spk-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#eef2f7" />
      <stop offset="100%" stop-color="#d9e2ec" />
    </linearGradient>
    <linearGradient id="p-spk-fg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#bcccdc" />
      <stop offset="100%" stop-color="#9fb3c8" />
    </linearGradient>
  </defs>

  <rect width="400" height="400" fill="url(#p-spk-bg)" />

  <g transform="translate(200 210)">
    <rect
      x="-78"
      y="-120"
      width="156"
      height="240"
      rx="78"
      fill="url(#p-spk-fg)"
      stroke="#627d98"
      stroke-width="6"
    />
    <g fill="#486581">
      <circle cx="-40" cy="-60" r="5" />
      <circle cx="-20" cy="-60" r="5" />
      <circle cx="0" cy="-60" r="5" />
      <circle cx="20" cy="-60" r="5" />
      <circle cx="40" cy="-60" r="5" />

      <circle cx="-40" cy="-40" r="5" />
      <circle cx="-20" cy="-40" r="5" />
      <circle cx="0" cy="-40" r="5" />
      <circle cx="20" cy="-40" r="5" />
      <circle cx="40" cy="-40" r="5" />

      <circle cx="-40" cy="-20" r="5" />
      <circle cx="-20" cy="-20" r="5" />
      <circle cx="0" cy="-20" r="5" />
      <circle cx="20" cy="-20" r="5" />
      <circle cx="40" cy="-20" r="5" />

      <circle cx="-40" cy="0" r="5" />
      <circle cx="-20" cy="0" r="5" />
      <circle cx="0" cy="0" r="5" />
      <circle cx="20" cy="0" r="5" />
      <circle cx="40" cy="0" r="5" />

      <circle cx="-40" cy="20" r="5" />
      <circle cx="-20" cy="20" r="5" />
      <circle cx="0" cy="20" r="5" />
      <circle cx="20" cy="20" r="5" />
      <circle cx="40" cy="20" r="5" />
    </g>
    <circle cx="0" cy="84" r="10" fill="#486581" />
  </g>
</svg>
