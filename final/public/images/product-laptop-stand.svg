<svg
  xmlns="http://www.w3.org/2000/svg"
  width="400"
  height="400"
  viewBox="0 0 400 400"
  role="img"
  aria-labelledby="p-stand-title p-stand-desc"
>
  <title id="p-stand-title">Laptop stand</title>
  <desc id="p-stand-desc">A square illustration of a laptop resting on an angled aluminum stand</desc>

  <defs>
    <linearGradient id="p-stand-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#eef2f7" />
      <stop offset="100%" stop-color="#d9e2ec" />
    </linearGradient>
    <linearGradient id="p-stand-fg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#bcccdc" />
      <stop offset="100%" stop-color="#9fb3c8" />
    </linearGradient>
  </defs>

  <rect width="400" height="400" fill="url(#p-stand-bg)" />

  <g transform="translate(200 210)">
    <path
      d="M-120 60 L-70 -70 L70 -70 L120 60 Z"
      fill="none"
      stroke="#627d98"
      stroke-width="12"
      stroke-linejoin="round"
      stroke-linecap="round"
    />
    <rect
      x="-96"
      y="-88"
      width="192"
      height="120"
      rx="10"
      fill="url(#p-stand-fg)"
      stroke="#627d98"
      stroke-width="6"
    />
    <rect x="-80" y="-74" width="160" height="92" rx="4" fill="#486581" />
    <path d="M-130 70 L130 70" stroke="#627d98" stroke-width="12" stroke-linecap="round" />
  </g>
</svg>
