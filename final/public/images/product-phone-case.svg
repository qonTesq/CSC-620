<svg
  xmlns="http://www.w3.org/2000/svg"
  width="400"
  height="400"
  viewBox="0 0 400 400"
  role="img"
  aria-labelledby="p-phone-title p-phone-desc"
>
  <title id="p-phone-title">Phone case</title>
  <desc id="p-phone-desc">A square illustration of a phone case with a camera cutout</desc>

  <defs>
    <linearGradient id="p-phone-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#eef2f7" />
      <stop offset="100%" stop-color="#d9e2ec" />
    </linearGradient>
    <linearGradient id="p-phone-fg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#bcccdc" />
      <stop offset="100%" stop-color="#9fb3c8" />
    </linearGradient>
  </defs>

  <rect width="400" height="400" fill="url(#p-phone-bg)" />

  <g transform="translate(200 210)">
    <rect
      x="-72"
      y="-140"
      width="144"
      height="280"
      rx="26"
      fill="url(#p-phone-fg)"
      stroke="#627d98"
      stroke-width="6"
    />
    <rect
      x="-48"
      y="-116"
      width="72"
      height="52"
      rx="14"
      fill="#486581"
    />
    <circle cx="-32" cy="-96" r="9" fill="#9fb3c8" />
    <circle cx="-4" cy="-96" r="9" fill="#9fb3c8" />
    <rect x="72" y="-70" width="6" height="28" rx="3" fill="#486581" />
    <rect x="-78" y="-60" width="6" height="18" rx="3" fill="#486581" />
    <rect x="-78" y="-30" width="6" height="36" rx="3" fill="#486581" />
  </g>
</svg>
