<svg
  xmlns="http://www.w3.org/2000/svg"
  width="400"
  height="400"
  viewBox="0 0 400 400"
  role="img"
  aria-labelledby="p-cbl-title p-cbl-desc"
>
  <title id="p-cbl-title">USB-C charging cable</title>
  <desc id="p-cbl-desc">A square illustration of a braided USB-C cable with a connector on each end</desc>

  <defs>
    <linearGradient id="p-cbl-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#eef2f7" />
      <stop offset="100%" stop-color="#d9e2ec" />
    </linearGradient>
    <linearGradient id="p-cbl-fg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#bcccdc" />
      <stop offset="100%" stop-color="#9fb3c8" />
    </linearGradient>
  </defs>

  <rect width="400" height="400" fill="url(#p-cbl-bg)" />

  <g transform="translate(200 210)">
    <path
      d="M-110 0 C-60 -120, 60 120, 110 0"
      fill="none"
      stroke="#627d98"
      stroke-width="14"
      stroke-linecap="round"
    />

    <g transform="translate(-110 0) rotate(-90)">
      <rect x="-26" y="-8" width="52" height="56" rx="14" fill="url(#p-cbl-fg)" stroke="#627d98" stroke-width="6" />
      <rect x="-16" y="-20" width="32" height="14" rx="7" fill="#486581" />
      <rect x="-12" y="22" width="24" height="8" rx="4" fill="#486581" />
    </g>

    <g transform="translate(110 0) rotate(90)">
      <rect x="-26" y="-8" width="52" height="56" rx="14" fill="url(#p-cbl-fg)" stroke="#627d98" stroke-width="6" />
      <rect x="-16" y="-20" width="32" height="14" rx="7" fill="#486581" />
      <rect x="-12" y="22" width="24" height="8" rx="4" fill="#486581" />
    </g>
  </g>
</svg>
