<svg
  xmlns="http://www.w3.org/2000/svg"
  width="400"
  height="400"
  viewBox="0 0 400 400"
  role="img"
  aria-labelledby="p-ssd-title p-ssd-desc"
>
  <title id="p-ssd-title">External SSD</title>
  <desc id="p-ssd-desc">A square illustration of a pocket-sized external solid state drive</desc>

  <defs>
    <linearGradient id="p-ssd-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#eef2f7" />
      <stop offset="100%" stop-color="#d9e2ec" />
    </linearGradient>
    <linearGradient id="p-ssd-fg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#bcccdc" />
      <stop offset="100%" stop-color="#9fb3c8" />
    </linearGradient>
  </defs>

  <rect width="400" height="400" fill="url(#p-ssd-bg)" />

  <g transform="translate(200 210)">
    <rect
      x="-120"
      y="-70"
      width="240"
      height="140"
      rx="20"
      fill="url(#p-ssd-fg)"
      stroke="#627d98"
      stroke-width="6"
    />
    <path
      d="M-90 -30 L80 -30"
      stroke="#627d98"
      stroke-width="6"
      stroke-linecap="round"
    />
    <circle cx="-100" cy="-30" r="8" fill="#486581" />
    <rect x="-54" y="18" width="108" height="26" rx="6" fill="#486581" />
  </g>
</svg>
