<svg
  xmlns="http://www.w3.org/2000/svg"
  width="400"
  height="400"
  viewBox="0 0 400 400"
  role="img"
  aria-labelledby="p-hp-title p-hp-desc"
>
  <title id="p-hp-title">Wireless headphones</title>
  <desc id="p-hp-desc">A square illustration of over-ear wireless headphones</desc>

  <defs>
    <linearGradient id="p-hp-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#eef2f7" />
      <stop offset="100%" stop-color="#d9e2ec" />
    </linearGradient>
    <linearGradient id="p-hp-fg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#bcccdc" />
      <stop offset="100%" stop-color="#9fb3c8" />
    </linearGradient>
  </defs>

  <rect width="400" height="400" fill="url(#p-hp-bg)" />

  <g transform="translate(200 210)">
    <path
      d="M-96 10 A96 96 0 0 1 96 10"
      fill="none"
      stroke="#627d98"
      stroke-width="12"
      stroke-linecap="round"
    />
    <rect x="-116" y="0" width="44" height="92" rx="18" fill="url(#p-hp-fg)" stroke="#627d98" stroke-width="6" />
    <rect x="72" y="0" width="44" height="92" rx="18" fill="url(#p-hp-fg)" stroke="#627d98" stroke-width="6" />
    <circle cx="-94" cy="46" r="6" fill="#486581" />
    <circle cx="94" cy="46" r="6" fill="#486581" />
  </g>
</svg>
