<svg
  xmlns="http://www.w3.org/2000/svg"
  width="400"
  height="400"
  viewBox="0 0 400 400"
  role="img"
  aria-labelledby="p-lamp-title p-lamp-desc"
>
  <title id="p-lamp-title">LED desk lamp</title>
  <desc id="p-lamp-desc">A square illustration of a dimmable LED desk lamp</desc>

  <defs>
    <linearGradient id="p-lamp-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#eef2f7" />
      <stop offset="100%" stop-color="#d9e2ec" />
    </linearGradient>
    <linearGradient id="p-lamp-fg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#bcccdc" />
      <stop offset="100%" stop-color="#9fb3c8" />
    </linearGradient>
  </defs>

  <rect width="400" height="400" fill="url(#p-lamp-bg)" />

  <g transform="translate(200 210)">
    <path
      d="M-78 -100 L78 -100 L54 -30 L-54 -30 Z"
      fill="url(#p-lamp-fg)"
      stroke="#627d98"
      stroke-width="6"
      stroke-linejoin="round"
    />
    <path
      d="M0 -30 L0 84"
      fill="none"
      stroke="#627d98"
      stroke-width="12"
      stroke-linecap="round"
    />
    <ellipse cx="0" cy="94" rx="84" ry="16" fill="url(#p-lamp-fg)" stroke="#627d98" stroke-width="6" />
    <circle cx="0" cy="-16" r="8" fill="#486581" />
  </g>
</svg>
