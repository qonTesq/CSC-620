<svg
  xmlns="http://www.w3.org/2000/svg"
  width="400"
  height="400"
  viewBox="0 0 400 400"
  role="img"
  aria-labelledby="p-cam-title p-cam-desc"
>
  <title id="p-cam-title">Webcam</title>
  <desc id="p-cam-desc">A square illustration of an HD webcam with a clip mount</desc>

  <defs>
    <linearGradient id="p-cam-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#eef2f7" />
      <stop offset="100%" stop-color="#d9e2ec" />
    </linearGradient>
    <linearGradient id="p-cam-fg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#bcccdc" />
      <stop offset="100%" stop-color="#9fb3c8" />
    </linearGradient>
  </defs>

  <rect width="400" height="400" fill="url(#p-cam-bg)" />

  <g transform="translate(200 210)">
    <rect
      x="-110"
      y="-50"
      width="220"
      height="100"
      rx="50"
      fill="url(#p-cam-fg)"
      stroke="#627d98"
      stroke-width="6"
    />
    <circle cx="0" cy="0" r="36" fill="#486581" />
    <circle cx="0" cy="0" r="18" fill="#9fb3c8" />
    <circle cx="-8" cy="-8" r="5" fill="#eef2f7" />
    <circle cx="74" cy="-22" r="5" fill="#486581" />
    <path
      d="M-72 50 L-72 96 L72 96 L72 50"
      fill="none"
      stroke="#627d98"
      stroke-width="12"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
  </g>
</svg>
