<svg
  xmlns="http://www.w3.org/2000/svg"
  width="400"
  height="400"
  viewBox="0 0 400 400"
  role="img"
  aria-labelledby="pp-title pp-desc"
>
  <title id="pp-title">Product placeholder</title>
  <desc id="pp-desc">A square placeholder illustration of a shopping bag for products without an image</desc>

  <defs>
    <linearGradient id="pp-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#eef2f7" />
      <stop offset="100%" stop-color="#d9e2ec" />
    </linearGradient>
    <linearGradient id="pp-bag" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#bcccdc" />
      <stop offset="100%" stop-color="#9fb3c8" />
    </linearGradient>
  </defs>

  <rect width="400" height="400" fill="url(#pp-bg)" />

  <g transform="translate(200 210)">
    <path
      d="M-90 -40 H90 L78 100 A20 20 0 0 1 58 118 H-58 A20 20 0 0 1 -78 100 Z"
      fill="url(#pp-bag)"
    />
    <path
      d="M-50 -40 V-70 A50 50 0 0 1 50 -70 V-40"
      fill="none"
      stroke="#627d98"
      stroke-width="12"
      stroke-linecap="round"
    />
    <circle cx="-40" cy="-20" r="6" fill="#486581" />
    <circle cx="40" cy="-20" r="6" fill="#486581" />
  </g>

</svg>
